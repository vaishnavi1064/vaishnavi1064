<svg width="100%" height="24" viewBox="0 0 800 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0B0D17" stop-opacity="0"/>
      <stop offset="20%" stop-color="#58A6FF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#58A6FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0B0D17" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes fa{0%{transform:translateX(-60px);opacity:0}8%{opacity:1}92%{opacity:1}100%{transform:translateX(820px);opacity:0}}
    @keyframes fe{0%,100%{opacity:.4}50%{opacity:.9}}
  </style>
  <!-- Line -->
  <line x1="50" y1="12" x2="750" y2="12" stroke="url(#dl)" stroke-width="0.5"/>
  <!-- Dots on line -->
  <circle cx="200" cy="12" r="1" fill="#58A6FF" opacity="0.4"/>
  <circle cx="400" cy="12" r="1.2" fill="#7C3AED" opacity="0.5"/>
  <circle cx="600" cy="12" r="1" fill="#58A6FF" opacity="0.4"/>
  <!-- Tiny rocket -->
  <g style="animation:fa 6s linear infinite">
    <g transform="translate(0,12)">
      <g style="animation:fe 0.25s ease-in-out infinite">
        <polygon points="-7,0 -14,-1.5 -7,1.5" fill="#FBBF24" opacity="0.6"/>
      </g>
      <ellipse cx="2" cy="0" rx="6" ry="2.2" fill="#F9A8D4"/>
      <polygon points="8,0 5.5,-1.5 5.5,1.5" fill="#EC4899"/>
      <circle cx="3.5" cy="0" r="1" fill="#93C5FD"/>
      <polygon points="-2,-1.5 -4,-3.5 0,-1.5" fill="#F472B6"/>
      <polygon points="-2,1.5 -4,3.5 0,1.5" fill="#F472B6"/>
    </g>
  </g>
</svg>
