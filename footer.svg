<svg width="100%" height="80" viewBox="0 0 800 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="f-earth" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </radialGradient>
    <radialGradient id="f-moon" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </radialGradient>
    <linearGradient id="f-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#7C3AED" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#7C3AED" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <style>
      @keyframes f-spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
      @keyframes f-orbit { 0%{transform:rotate(0deg) translateX(22px) rotate(0deg)} 100%{transform:rotate(360deg) translateX(22px) rotate(-360deg)} }
      @keyframes f-twinkle { 0%,100%{opacity:.3} 50%{opacity:.8} }
      @keyframes f-pulse { 0%,100%{opacity:.3;r:1.5} 50%{opacity:.7;r:2.5} }
      .f-earth { animation: f-spin 20s linear infinite; transform-origin: 400px 35px; }
      .f-moon { animation: f-orbit 8s linear infinite; transform-origin: 400px 35px; }
      .f-star { animation: f-twinkle 3s ease-in-out infinite; }
      .f-signal { animation: f-pulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Stars -->
  <circle cx="60" cy="20" r="0.5" fill="#E2E8F0" class="f-star"/>
  <circle cx="150" cy="50" r="0.4" fill="#93C5FD" class="f-star" style="animation-delay:0.5s"/>
  <circle cx="250" cy="15" r="0.6" fill="#E2E8F0" class="f-star" style="animation-delay:1s"/>
  <circle cx="550" cy="18" r="0.5" fill="#A78BFA" class="f-star" style="animation-delay:0.3s"/>
  <circle cx="650" cy="55" r="0.4" fill="#E2E8F0" class="f-star" style="animation-delay:0.8s"/>
  <circle cx="740" cy="25" r="0.5" fill="#93C5FD" class="f-star" style="animation-delay:1.2s"/>
  <circle cx="100" cy="60" r="0.4" fill="#E2E8F0" class="f-star" style="animation-delay:0.6s"/>
  <circle cx="700" cy="45" r="0.5" fill="#A78BFA" class="f-star" style="animation-delay:0.9s"/>

  <!-- Earth (center) -->
  <g class="f-earth">
    <circle cx="400" cy="35" r="14" fill="url(#f-earth)"/>
    <ellipse cx="394" cy="30" rx="4" ry="3" fill="#34D399" opacity="0.5"/>
    <ellipse cx="406" cy="38" rx="3" ry="5" fill="#34D399" opacity="0.4"/>
    <circle cx="400" cy="35" r="15.5" fill="none" stroke="#60A5FA" stroke-width="0.4" opacity="0.3"/>
  </g>

  <!-- Moon -->
  <g class="f-moon">
    <circle cx="400" cy="35" r="3.5" fill="url(#f-moon)"/>
  </g>

  <!-- Signal waves from left (satellite dish concept) -->
  <circle cx="320" cy="35" r="1.5" fill="#A78BFA" class="f-signal"/>
  <circle cx="320" cy="35" r="1.5" fill="none" stroke="#A78BFA" stroke-width="0.4" class="f-signal" style="animation-delay:0.5s"/>

  <!-- Signal waves from right -->
  <circle cx="480" cy="35" r="1.5" fill="#A78BFA" class="f-signal" style="animation-delay:0.3s"/>
  <circle cx="480" cy="35" r="1.5" fill="none" stroke="#A78BFA" stroke-width="0.4" class="f-signal" style="animation-delay:0.8s"/>

  <!-- Text -->
  <text x="400" y="72" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="#94A3B8" letter-spacing="2">✦ transmitting from seattle · open to new orbits ✦</text>
</svg>
