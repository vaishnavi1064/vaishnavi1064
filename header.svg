<svg width="100%" height="250" viewBox="0 0 1000 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="n1" cx="20%" cy="40%" r="50%"><stop offset="0%" stop-color="#7C3AED" stop-opacity="0.3"/><stop offset="100%" stop-color="#0B0D17" stop-opacity="0"/></radialGradient>
    <radialGradient id="n2" cx="75%" cy="60%" r="40%"><stop offset="0%" stop-color="#2563EB" stop-opacity="0.25"/><stop offset="100%" stop-color="#0B0D17" stop-opacity="0"/></radialGradient>
    <radialGradient id="n3" cx="50%" cy="30%" r="35%"><stop offset="0%" stop-color="#6D28D9" stop-opacity="0.15"/><stop offset="100%" stop-color="#0B0D17" stop-opacity="0"/></radialGradient>
    <radialGradient id="eg" cx="40%" cy="35%" r="50%"><stop offset="0%" stop-color="#60A5FA"/><stop offset="40%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#1E3A5F"/></radialGradient>
    <radialGradient id="mg" cx="35%" cy="35%" r="50%"><stop offset="0%" stop-color="#E2E8F0"/><stop offset="100%" stop-color="#94A3B8"/></radialGradient>
  </defs>
  <style>
    @keyframes t1{0%,100%{opacity:.2}50%{opacity:1}}
    @keyframes t2{0%,100%{opacity:.5}50%{opacity:.1}}
    @keyframes t3{0%,100%{opacity:.15}50%{opacity:.85}}
    @keyframes fl{0%,100%{opacity:.9}50%{opacity:1}}
    @keyframes rf{0%{transform:translate(-80px,195px) rotate(-15deg);opacity:0}8%{opacity:1}92%{opacity:1}100%{transform:translate(770px,115px) rotate(-15deg);opacity:0}}
    @keyframes ex{0%,100%{opacity:.5}50%{opacity:.9}}
    @keyframes mo{0%{transform:rotate(0deg) translate(30px,0) rotate(0deg)}100%{transform:rotate(360deg) translate(30px,0) rotate(-360deg)}}
    @keyframes es{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  </style>

  <!-- Space -->
  <rect width="1000" height="250" fill="#0B0D17"/>
  <rect width="1000" height="250" fill="url(#n1)"/>
  <rect width="1000" height="250" fill="url(#n2)"/>
  <rect width="1000" height="250" fill="url(#n3)"/>

  <!-- Stars dim -->
  <circle cx="45" cy="30" r="0.6" fill="#E2E8F0" style="animation:t1 3s ease-in-out infinite"/>
  <circle cx="120" cy="80" r="0.4" fill="#CBD5E1" style="animation:t2 4s ease-in-out infinite"/>
  <circle cx="200" cy="15" r="0.6" fill="#E2E8F0" style="animation:t3 2.5s ease-in-out infinite"/>
  <circle cx="280" cy="95" r="0.4" fill="#CBD5E1" style="animation:t1 5s ease-in-out infinite"/>
  <circle cx="350" cy="45" r="0.5" fill="#E2E8F0" style="animation:t2 3.5s ease-in-out infinite"/>
  <circle cx="430" cy="220" r="0.4" fill="#CBD5E1" style="animation:t1 3s ease-in-out infinite"/>
  <circle cx="510" cy="25" r="0.5" fill="#E2E8F0" style="animation:t2 4s ease-in-out infinite"/>
  <circle cx="590" cy="200" r="0.4" fill="#CBD5E1" style="animation:t3 2.5s ease-in-out infinite"/>
  <circle cx="670" cy="55" r="0.6" fill="#E2E8F0" style="animation:t1 5s ease-in-out infinite"/>
  <circle cx="750" cy="130" r="0.4" fill="#CBD5E1" style="animation:t2 3.5s ease-in-out infinite"/>
  <circle cx="830" cy="20" r="0.5" fill="#E2E8F0" style="animation:t1 3s ease-in-out infinite"/>
  <circle cx="960" cy="230" r="0.5" fill="#E2E8F0" style="animation:t3 4s ease-in-out infinite"/>
  <circle cx="80" cy="190" r="0.4" fill="#CBD5E1" style="animation:t2 5s ease-in-out infinite"/>
  <circle cx="170" cy="230" r="0.5" fill="#E2E8F0" style="animation:t1 3.5s ease-in-out infinite"/>
  <circle cx="320" cy="200" r="0.4" fill="#CBD5E1" style="animation:t3 3s ease-in-out infinite"/>
  <circle cx="480" cy="100" r="0.4" fill="#E2E8F0" style="animation:t2 4s ease-in-out infinite"/>

  <!-- Stars bright -->
  <circle cx="95" cy="50" r="1" fill="#FFF" opacity="0.7" style="animation:t3 3s ease-in-out infinite"/>
  <circle cx="250" cy="160" r="0.8" fill="#FFF" opacity="0.6" style="animation:t1 4s ease-in-out infinite"/>
  <circle cx="400" cy="30" r="1.2" fill="#FFF" opacity="0.8" style="animation:t2 2.5s ease-in-out infinite"/>
  <circle cx="550" cy="210" r="0.8" fill="#FFF" opacity="0.5" style="animation:t3 5s ease-in-out infinite"/>
  <circle cx="700" cy="40" r="1" fill="#FFF" opacity="0.7" style="animation:t1 3.5s ease-in-out infinite"/>

  <!-- Stars colored -->
  <circle cx="180" cy="65" r="1.2" fill="#93C5FD" opacity="0.5" style="animation:t2 3s ease-in-out infinite"/>
  <circle cx="460" cy="180" r="1" fill="#A78BFA" opacity="0.4" style="animation:t1 4s ease-in-out infinite"/>
  <circle cx="720" cy="90" r="1.3" fill="#93C5FD" opacity="0.5" style="animation:t3 3.5s ease-in-out infinite"/>

  <!-- Earth -->
  <g style="animation:es 25s linear infinite;transform-origin:900px 65px">
    <circle cx="900" cy="65" r="22" fill="url(#eg)"/>
    <ellipse cx="892" cy="57" rx="6" ry="4" fill="#34D399" opacity="0.5"/>
    <ellipse cx="906" cy="69" rx="5" ry="7" fill="#34D399" opacity="0.4"/>
    <ellipse cx="894" cy="75" rx="4" ry="3" fill="#34D399" opacity="0.3"/>
    <circle cx="900" cy="65" r="23.5" fill="none" stroke="#60A5FA" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Moon -->
  <g style="animation:mo 10s linear infinite;transform-origin:900px 65px">
    <circle cx="900" cy="65" r="5" fill="url(#mg)"/>
    <circle cx="898" cy="63" r="1" fill="#CBD5E1" opacity="0.4"/>
  </g>

  <!-- Rocket -->
  <g style="animation:rf 12s linear infinite">
    <!-- Exhaust -->
    <g style="animation:ex 0.3s ease-in-out infinite">
      <polygon points="-12,2.5 -26,-1 -12,6" fill="#FBBF24" opacity="0.7"/>
      <polygon points="-10,2 -20,0 -10,5" fill="#FDE68A" opacity="0.5"/>
    </g>
    <!-- Body -->
    <ellipse cx="5" cy="3" rx="14" ry="5" fill="#F9A8D4"/>
    <!-- Nose -->
    <polygon points="19,3 13,-1.5 13,7.5" fill="#EC4899"/>
    <!-- Window -->
    <circle cx="9" cy="3" r="2.5" fill="#DBEAFE"/>
    <circle cx="9" cy="3" r="1.5" fill="#93C5FD"/>
    <!-- Fins -->
    <polygon points="-6,0 -10,-5 -2,0" fill="#F472B6"/>
    <polygon points="-6,6 -10,11 -2,6" fill="#F472B6"/>
  </g>

  <!-- Name glow (no filter, just ellipse) -->
  <ellipse cx="500" cy="100" rx="220" ry="35" fill="#58A6FF" opacity="0.08"/>

  <!-- Name -->
  <g style="animation:fl 6s ease-in-out infinite">
    <text x="500" y="95" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">Vaishnavi Chaughule</text>
  </g>

  <!-- Subtitle -->
  <text x="500" y="130" text-anchor="middle" font-family="monospace" font-size="13" fill="#93C5FD" letter-spacing="3">AI/ML ENGINEER · MULTI-AGENT SYSTEMS · RESEARCH</text>

  <!-- Orbit line -->
  <ellipse cx="500" cy="160" rx="320" ry="8" fill="none" stroke="#58A6FF" stroke-width="0.3" opacity="0.25"/>

  <!-- University -->
  <text x="500" y="195" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#94A3B8">M.S. Computer Science · Northeastern University, Seattle · GPA: 3.67</text>
</svg>
