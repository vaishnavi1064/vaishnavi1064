<svg width="100%" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="nebula1" cx="20%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="75%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="50%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#6D28D9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes twinkle1 { 0%,100%{opacity:.3} 50%{opacity:1} }
      @keyframes twinkle2 { 0%,100%{opacity:.5} 50%{opacity:.1} }
      @keyframes twinkle3 { 0%,100%{opacity:.2} 50%{opacity:.9} }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
      .s1 { animation: twinkle1 3s ease-in-out infinite; }
      .s2 { animation: twinkle2 4s ease-in-out infinite; }
      .s3 { animation: twinkle3 2.5s ease-in-out infinite; }
      .s4 { animation: twinkle1 5s ease-in-out infinite; }
      .s5 { animation: twinkle2 3.5s ease-in-out infinite; }
      .title { animation: float 6s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Deep space background -->
  <rect width="1000" height="220" fill="#0B0D17"/>
  
  <!-- Nebula clouds -->
  <rect width="1000" height="220" fill="url(#nebula1)"/>
  <rect width="1000" height="220" fill="url(#nebula2)"/>
  <rect width="1000" height="220" fill="url(#nebula3)"/>

  <!-- Stars - Layer 1 (dim, distant) -->
  <circle cx="45" cy="30" r="0.5" fill="#E2E8F0" class="s1"/>
  <circle cx="120" cy="80" r="0.4" fill="#CBD5E1" class="s2"/>
  <circle cx="200" cy="15" r="0.6" fill="#E2E8F0" class="s3"/>
  <circle cx="280" cy="95" r="0.3" fill="#CBD5E1" class="s4"/>
  <circle cx="350" cy="45" r="0.5" fill="#E2E8F0" class="s5"/>
  <circle cx="430" cy="190" r="0.4" fill="#CBD5E1" class="s1"/>
  <circle cx="510" cy="25" r="0.5" fill="#E2E8F0" class="s2"/>
  <circle cx="590" cy="170" r="0.3" fill="#CBD5E1" class="s3"/>
  <circle cx="670" cy="55" r="0.6" fill="#E2E8F0" class="s4"/>
  <circle cx="750" cy="130" r="0.4" fill="#CBD5E1" class="s5"/>
  <circle cx="830" cy="20" r="0.5" fill="#E2E8F0" class="s1"/>
  <circle cx="910" cy="85" r="0.3" fill="#CBD5E1" class="s2"/>
  <circle cx="960" cy="200" r="0.5" fill="#E2E8F0" class="s3"/>
  <circle cx="80" cy="160" r="0.4" fill="#CBD5E1" class="s4"/>
  <circle cx="170" cy="200" r="0.5" fill="#E2E8F0" class="s5"/>
  <circle cx="320" cy="170" r="0.3" fill="#CBD5E1" class="s1"/>
  <circle cx="480" cy="100" r="0.4" fill="#E2E8F0" class="s2"/>
  <circle cx="620" cy="210" r="0.5" fill="#CBD5E1" class="s3"/>
  <circle cx="770" cy="195" r="0.3" fill="#E2E8F0" class="s4"/>
  <circle cx="890" cy="150" r="0.4" fill="#CBD5E1" class="s5"/>

  <!-- Stars - Layer 2 (brighter, closer) -->
  <circle cx="95" cy="50" r="1" fill="#FFFFFF" class="s3" opacity="0.7"/>
  <circle cx="250" cy="140" r="0.8" fill="#FFFFFF" class="s1" opacity="0.6"/>
  <circle cx="400" cy="30" r="1.2" fill="#FFFFFF" class="s5" opacity="0.8"/>
  <circle cx="550" cy="180" r="0.8" fill="#FFFFFF" class="s2" opacity="0.5"/>
  <circle cx="700" cy="40" r="1" fill="#FFFFFF" class="s4" opacity="0.7"/>
  <circle cx="850" cy="160" r="0.8" fill="#FFFFFF" class="s1" opacity="0.6"/>
  <circle cx="950" cy="60" r="1" fill="#FFFFFF" class="s3" opacity="0.5"/>
  <circle cx="150" cy="120" r="0.8" fill="#FFFFFF" class="s5" opacity="0.7"/>

  <!-- Stars - Layer 3 (blue-tinted accent stars) -->
  <circle cx="180" cy="65" r="1.2" fill="#93C5FD" class="s2" opacity="0.5"/>
  <circle cx="460" cy="150" r="1" fill="#A78BFA" class="s4" opacity="0.4"/>
  <circle cx="720" cy="90" r="1.3" fill="#93C5FD" class="s1" opacity="0.5"/>
  <circle cx="380" cy="200" r="0.8" fill="#A78BFA" class="s3" opacity="0.4"/>
  <circle cx="860" cy="40" r="1" fill="#93C5FD" class="s5" opacity="0.5"/>

  <!-- Name glow backdrop -->
  <ellipse cx="500" cy="85" rx="200" ry="40" fill="url(#glow)" opacity="0.4"/>

  <!-- Name -->
  <g class="title">
    <text x="500" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" filter="url(#softglow)">Vaishnavi Chaughule</text>
  </g>

  <!-- Subtitle -->
  <text x="500" y="115" text-anchor="middle" font-family="'Fira Code', monospace" font-size="13" fill="#93C5FD" letter-spacing="3">AI/ML ENGINEER · MULTI-AGENT SYSTEMS · RESEARCH</text>

  <!-- Thin orbit line decoration -->
  <ellipse cx="500" cy="145" rx="320" ry="8" fill="none" stroke="#58A6FF" stroke-width="0.3" opacity="0.3"/>
  <circle cx="180" cy="144" r="2" fill="#58A6FF" opacity="0.6" class="s2"/>
  <circle cx="500" cy="137" r="1.5" fill="#A78BFA" opacity="0.5" class="s4"/>
  <circle cx="820" cy="144" r="2" fill="#58A6FF" opacity="0.6" class="s1"/>

  <!-- Bottom info line -->
  <text x="500" y="175" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94A3B8">M.S. Computer Science · Northeastern University, Seattle · GPA: 3.67</text>

  <!-- Horizon glow at bottom -->
  <rect x="0" y="205" width="1000" height="15" fill="url(#nebula2)" opacity="0.5"/>
  <line x1="0" y1="218" x2="1000" y2="218" stroke="#1E293B" stroke-width="0.5"/>
</svg>
