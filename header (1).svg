<svg width="100%" height="250" viewBox="0 0 1000 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="nebula1" cx="20%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="75%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="50%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#6D28D9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="earth-grad" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="40%" stop-color="#3B82F6"/>
      <stop offset="70%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </radialGradient>
    <radialGradient id="moon-grad" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </radialGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes twinkle1 { 0%,100%{opacity:.3} 50%{opacity:1} }
      @keyframes twinkle2 { 0%,100%{opacity:.5} 50%{opacity:.1} }
      @keyframes twinkle3 { 0%,100%{opacity:.2} 50%{opacity:.9} }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
      @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
      @keyframes rocket-fly {
        0% { transform: translate(-80px, 60px); opacity: 0; }
        8% { opacity: 1; }
        92% { opacity: 1; }
        100% { transform: translate(850px, -40px); opacity: 0; }
      }
      @keyframes exhaust-flicker { 0%,100%{opacity:.6;transform:scaleX(1)} 50%{opacity:1;transform:scaleX(1.4)} }
      @keyframes moon-orbit { 0%{transform:rotate(0deg) translateX(30px) rotate(0deg)} 100%{transform:rotate(360deg) translateX(30px) rotate(-360deg)} }
      .s1 { animation: twinkle1 3s ease-in-out infinite; }
      .s2 { animation: twinkle2 4s ease-in-out infinite; }
      .s3 { animation: twinkle3 2.5s ease-in-out infinite; }
      .s4 { animation: twinkle1 5s ease-in-out infinite; }
      .s5 { animation: twinkle2 3.5s ease-in-out infinite; }
      .title { animation: float 6s ease-in-out infinite; }
      .earth-spin { animation: spin 25s linear infinite; transform-origin: 900px 65px; }
      .moon-group { animation: moon-orbit 10s linear infinite; transform-origin: 900px 65px; }
      .rocket-group { animation: rocket-fly 12s linear infinite; }
      .exhaust { animation: exhaust-flicker 0.3s ease-in-out infinite; transform-origin: left center; }
    </style>
  </defs>

  <!-- Deep space -->
  <rect width="1000" height="250" fill="#0B0D17"/>
  <rect width="1000" height="250" fill="url(#nebula1)"/>
  <rect width="1000" height="250" fill="url(#nebula2)"/>
  <rect width="1000" height="250" fill="url(#nebula3)"/>

  <!-- Stars layer 1 (dim) -->
  <circle cx="45" cy="30" r="0.5" fill="#E2E8F0" class="s1"/>
  <circle cx="120" cy="80" r="0.4" fill="#CBD5E1" class="s2"/>
  <circle cx="200" cy="15" r="0.6" fill="#E2E8F0" class="s3"/>
  <circle cx="280" cy="95" r="0.3" fill="#CBD5E1" class="s4"/>
  <circle cx="350" cy="45" r="0.5" fill="#E2E8F0" class="s5"/>
  <circle cx="430" cy="220" r="0.4" fill="#CBD5E1" class="s1"/>
  <circle cx="510" cy="25" r="0.5" fill="#E2E8F0" class="s2"/>
  <circle cx="590" cy="200" r="0.3" fill="#CBD5E1" class="s3"/>
  <circle cx="670" cy="55" r="0.6" fill="#E2E8F0" class="s4"/>
  <circle cx="750" cy="130" r="0.4" fill="#CBD5E1" class="s5"/>
  <circle cx="830" cy="20" r="0.5" fill="#E2E8F0" class="s1"/>
  <circle cx="960" cy="230" r="0.5" fill="#E2E8F0" class="s3"/>
  <circle cx="80" cy="190" r="0.4" fill="#CBD5E1" class="s4"/>
  <circle cx="170" cy="230" r="0.5" fill="#E2E8F0" class="s5"/>
  <circle cx="320" cy="200" r="0.3" fill="#CBD5E1" class="s1"/>
  <circle cx="480" cy="100" r="0.4" fill="#E2E8F0" class="s2"/>
  <circle cx="620" cy="240" r="0.5" fill="#CBD5E1" class="s3"/>
  <circle cx="770" cy="225" r="0.3" fill="#E2E8F0" class="s4"/>

  <!-- Stars layer 2 (bright) -->
  <circle cx="95" cy="50" r="1" fill="#FFF" class="s3" opacity="0.7"/>
  <circle cx="250" cy="160" r="0.8" fill="#FFF" class="s1" opacity="0.6"/>
  <circle cx="400" cy="30" r="1.2" fill="#FFF" class="s5" opacity="0.8"/>
  <circle cx="550" cy="210" r="0.8" fill="#FFF" class="s2" opacity="0.5"/>
  <circle cx="700" cy="40" r="1" fill="#FFF" class="s4" opacity="0.7"/>
  <circle cx="150" cy="140" r="0.8" fill="#FFF" class="s5" opacity="0.7"/>

  <!-- Stars layer 3 (colored) -->
  <circle cx="180" cy="65" r="1.2" fill="#93C5FD" class="s2" opacity="0.5"/>
  <circle cx="460" cy="180" r="1" fill="#A78BFA" class="s4" opacity="0.4"/>
  <circle cx="720" cy="90" r="1.3" fill="#93C5FD" class="s1" opacity="0.5"/>
  <circle cx="380" cy="230" r="0.8" fill="#A78BFA" class="s3" opacity="0.4"/>

  <!-- Earth -->
  <g class="earth-spin">
    <circle cx="900" cy="65" r="22" fill="url(#earth-grad)"/>
    <ellipse cx="892" cy="57" rx="6" ry="4" fill="#34D399" opacity="0.5"/>
    <ellipse cx="906" cy="69" rx="5" ry="7" fill="#34D399" opacity="0.4"/>
    <ellipse cx="894" cy="75" rx="4" ry="3" fill="#34D399" opacity="0.3"/>
    <circle cx="900" cy="65" r="23.5" fill="none" stroke="#60A5FA" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Moon -->
  <g class="moon-group">
    <circle cx="900" cy="65" r="5" fill="url(#moon-grad)"/>
    <circle cx="898" cy="63" r="1" fill="#CBD5E1" opacity="0.4"/>
    <circle cx="902" cy="67" r="0.7" fill="#CBD5E1" opacity="0.3"/>
  </g>

  <!-- Rocket (pink, flies across) -->
  <g class="rocket-group">
    <g transform="translate(100, 195) rotate(-15)">
      <!-- Exhaust -->
      <g class="exhaust">
        <polygon points="-12,2.5 -26,-1 -12,6" fill="#FBBF24" opacity="0.7"/>
        <polygon points="-10,2 -20,0 -10,5" fill="#FDE68A" opacity="0.5"/>
        <polygon points="-8,2.5 -15,1 -8,4" fill="#FEF9C3" opacity="0.4"/>
      </g>
      <!-- Body -->
      <ellipse cx="5" cy="3" rx="14" ry="5" fill="#F9A8D4"/>
      <!-- Nose -->
      <polygon points="19,3 13,-1.5 13,7.5" fill="#EC4899"/>
      <!-- Window -->
      <circle cx="9" cy="3" r="2.5" fill="#DBEAFE"/>
      <circle cx="9" cy="3" r="1.5" fill="#93C5FD"/>
      <!-- Fins -->
      <polygon points="-6,0 -10,-5 -2,0" fill="#F472B6"/>
      <polygon points="-6,6 -10,11 -2,6" fill="#F472B6"/>
      <!-- Stripe -->
      <line x1="2" y1="-1.5" x2="2" y2="7.5" stroke="#EC4899" stroke-width="0.8" opacity="0.5"/>
    </g>
  </g>

  <!-- Name glow -->
  <ellipse cx="500" cy="100" rx="200" ry="40" fill="url(#glow)" opacity="0.35"/>

  <!-- Name -->
  <g class="title">
    <text x="500" y="95" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" filter="url(#softglow)">Vaishnavi Chaughule</text>
  </g>

  <!-- Subtitle -->
  <text x="500" y="130" text-anchor="middle" font-family="'Fira Code', monospace" font-size="13" fill="#93C5FD" letter-spacing="3">AI/ML ENGINEER · MULTI-AGENT SYSTEMS · RESEARCH</text>

  <!-- Orbit decoration -->
  <ellipse cx="500" cy="160" rx="320" ry="8" fill="none" stroke="#58A6FF" stroke-width="0.3" opacity="0.25"/>

  <!-- Bottom info -->
  <text x="500" y="195" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94A3B8">M.S. Computer Science · Northeastern University, Seattle · GPA: 3.67</text>

  <!-- Bottom edge -->
  <rect x="0" y="240" width="1000" height="10" fill="url(#nebula2)" opacity="0.4"/>
</svg>
