<svg width="100%" height="24" viewBox="0 0 800 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#58A6FF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#58A6FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <style>
      @keyframes fly-across { 0%{transform:translateX(-60px);opacity:0} 8%{opacity:1} 92%{opacity:1} 100%{transform:translateX(820px);opacity:0} }
      @keyframes trail { 0%,100%{opacity:.5;transform:scaleX(1)} 50%{opacity:.8;transform:scaleX(1.3)} }
      .mini-rocket { animation: fly-across 6s linear infinite; }
      .mini-trail { animation: trail 0.25s ease-in-out infinite; transform-origin: left center; }
    </style>
  </defs>
  <!-- Line -->
  <line x1="50" y1="12" x2="750" y2="12" stroke="url(#dline)" stroke-width="0.5"/>
  <!-- Stars on line -->
  <circle cx="200" cy="12" r="1" fill="#58A6FF" opacity="0.4"/>
  <circle cx="400" cy="12" r="1.2" fill="#7C3AED" opacity="0.5"/>
  <circle cx="600" cy="12" r="1" fill="#58A6FF" opacity="0.4"/>
  <!-- Tiny rocket -->
  <g class="mini-rocket">
    <g transform="translate(0, 12)">
      <!-- Tiny exhaust -->
      <g class="mini-trail">
        <polygon points="-7,0 -14,-1.5 -7,1.5" fill="#FBBF24" opacity="0.6"/>
        <polygon points="-5,0 -10,-0.8 -5,1" fill="#FDE68A" opacity="0.4"/>
      </g>
      <!-- Tiny body -->
      <ellipse cx="2" cy="0" rx="6" ry="2.2" fill="#F9A8D4"/>
      <!-- Tiny nose -->
      <polygon points="8,0 5.5,-1.5 5.5,1.5" fill="#EC4899"/>
      <!-- Tiny window -->
      <circle cx="3.5" cy="0" r="1" fill="#93C5FD"/>
      <!-- Tiny fins -->
      <polygon points="-2,-1.5 -4,-3.5 0,-1.5" fill="#F472B6"/>
      <polygon points="-2,1.5 -4,3.5 0,1.5" fill="#F472B6"/>
    </g>
  </g>
</svg>
