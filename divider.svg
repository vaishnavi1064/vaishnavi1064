<svg width="100%" height="30" viewBox="0 0 800 30" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#58A6FF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#58A6FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <style>
      @keyframes orbit { 0%,100%{opacity:.4} 50%{opacity:1} }
      .orb { animation: orbit 3s ease-in-out infinite; }
    </style>
  </defs>
  <line x1="50" y1="15" x2="750" y2="15" stroke="url(#line-grad)" stroke-width="0.5"/>
  <circle cx="400" cy="15" r="2" fill="#7C3AED" class="orb" opacity="0.6"/>
  <circle cx="200" cy="15" r="1.2" fill="#58A6FF" class="orb" style="animation-delay:0.5s" opacity="0.5"/>
  <circle cx="600" cy="15" r="1.2" fill="#58A6FF" class="orb" style="animation-delay:1s" opacity="0.5"/>
</svg>
